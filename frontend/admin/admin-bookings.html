<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Bookings – Nishant Admin</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .filter-bar select {
      padding: 0.5rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      font-size: 0.85rem;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    .filter-bar select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ---- Booking Details Modal ---- */
    .bk-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .bk-modal-overlay.open {
      display: flex;
    }

    .bk-modal {
      background: var(--surface);
      border-radius: var(--r-xl);
      width: 100%;
      max-width: 580px;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .bk-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    .bk-modal-header h3 {
      font-size: 1.05rem;
      font-weight: 700;
    }

    .bk-modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
      padding: 0 0.2rem;
    }

    .bk-modal-body {
      padding: 1.5rem 1.75rem;
    }

    .bk-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      margin: 1.2rem 0 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .bk-section-title:first-child {
      margin-top: 0;
    }

    .bk-detail-row {
      display: flex;
      gap: 0.5rem;
      font-size: 0.88rem;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }

    .bk-detail-row .lbl {
      min-width: 130px;
      color: var(--text-muted);
      font-weight: 500;
      flex-shrink: 0;
    }

    .bk-detail-row .val {
      color: var(--text);
      font-weight: 600;
    }

    .bk-menu-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: var(--r-sm);
      padding: 0.15rem 0.5rem;
      font-size: 0.78rem;
      font-weight: 500;
      margin: 0.1rem 0.1rem 0 0;
    }
  </style>
</head>

<body>
  <div class="admin-shell">

    <aside class="sidebar">
      <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close menu">&times;</button>
      <div class="sidebar-logo">
        <img src="../assets/logo.svg" alt="Nishant Logo" style="height:48px; filter:brightness(0) invert(1);">
        <small>Admin Panel</small>
      </div>
      <nav class="sidebar-nav">
        <!-- Dynamically populated by admin-sidebar.js -->
      </nav>
      <div class="sidebar-footer">
        <a href="#" onclick="event.preventDefault(); window.adminLogout();"><svg class="icon" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg> Logout</a>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <button class="admin-menu-toggle" id="adminMenuToggle" aria-label="Toggle menu">☰</button>
        <h1>All Bookings</h1>
        <span id="countLabel" style="font-size:0.82rem;color:var(--text-muted)"></span>
      </div>

      <div class="admin-content">

        <!-- Search & Filter bar -->
        <div class="filter-bar">
          <div class="search-wrap" style="flex:1;max-width:300px">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInp" class="form-control" placeholder="Order ID or client name…"
              oninput="renderTable()" />
          </div>
          <input type="text" id="phoneInp" class="form-control" placeholder="Mobile number…" style="max-width:180px"
            oninput="renderTable()" />
          <select id="statusFilter" onchange="renderTable()">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <div class="card">
          <div class="table-wrap" style="border:none;border-radius:0">
            <table>
              <thead>
                <tr>
                  <th>Booking ID</th>
                  <th>Client</th>
                  <th>Phone</th>
                  <th>Event Date</th>
                  <th>Package</th>
                  <th>Guests</th>
                  <th>Grand Total</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="bookingsTbody"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- BOOKING DETAILS MODAL -->
  <div class="bk-modal-overlay" id="bkDetailsModal">
    <div class="bk-modal">
      <div class="bk-modal-header">
        <h3>Booking Details</h3>
        <button class="bk-modal-close"
          onclick="document.getElementById('bkDetailsModal').classList.remove('open')">&times;</button>
      </div>
      <div class="bk-modal-body" id="bkDetailsBody"></div>
    </div>
  </div>

  <script type="module">
    import { initAuthListener, logoutUser } from '../js/auth.js';
    import { fetchAllBookings, approveBooking, rejectBooking, loadPackages } from '../js/admin-bookings.js';

    initAuthListener({ requireAuth: true, requireAdmin: true });
    window.adminLogout = async function () { await logoutUser(); };

    let allBookings = [];

    window.renderTable = function () {
      const q = document.getElementById('searchInp').value.toLowerCase().trim();
      const phone = document.getElementById('phoneInp').value.trim();
      const status = document.getElementById('statusFilter').value;

      let filtered = allBookings;
      if (q) filtered = filtered.filter(b =>
        (b.id || '').toLowerCase().includes(q) ||
        (b.userName || b.name || '').toLowerCase().includes(q) ||
        (b.pkgName || '').toLowerCase().includes(q)
      );
      if (phone) filtered = filtered.filter(b => (b.phone || '').replace(/\D/g, '').includes(phone.replace(/\D/g, '')));
      if (status) filtered = filtered.filter(b => b.status === status);

      document.getElementById('countLabel').textContent = `${filtered.length} booking${filtered.length !== 1 ? 's' : ''} found`;

      const tbody = document.getElementById('bookingsTbody');
      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:3rem;color:var(--text-muted)">No bookings found.</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(b => {
        const isPending = (b.status || 'pending') === 'pending';
        const actionBtns = isPending
          ? `<div style="display:flex;gap:0.4rem;flex-wrap:wrap">
               <button class="btn btn-sm" style="background:var(--info-bg,#e0f2fe);color:var(--info,#0369a1);" onclick='window.openDetails(${JSON.stringify(b).replace(/'/g, "&apos;")})'>👁 View</button>
               <button class="btn btn-sm" style="background:var(--success-bg);color:var(--success);" onclick="window.doApprove('${b.id}')">✅ Approve</button>
               <button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger);" onclick="window.doReject('${b.id}')">❌ Reject</button>
             </div>`
          : `<a href="booking-details.html?id=${b.id}" class="btn btn-outline btn-sm">View</a>`;

        return `<tr>
          <td style="font-weight:600;font-size:0.82rem"><a href="booking-details.html?id=${b.id}" style="color:var(--accent)" title="${b.id}">${b.id.substring(0, 8)}…</a></td>
          <td>${b.userName || b.name || '—'}</td>
          <td>${b.phone || '—'}</td>
          <td>${b.eventDate || b.date || '—'}</td>
          <td>${b.packages && b.packages.length > 0 ? b.packages.map(p => p.name).join(' + ') : (b.pkgName || b.pkg || 'Custom Event')}</td>
          <td>${b.guestCount || b.guests || '—'}</td>
          <td>${(b.grandTotal !== undefined && b.grandTotal !== null) ? '₹' + Number(b.grandTotal).toLocaleString('en-IN') : (b.estimatedTotal ? '<em style="color:var(--text-muted)">≈₹' + Number(b.estimatedTotal).toLocaleString('en-IN') + ' (est.)</em>' : '<em style="color:var(--text-muted)">Pending</em>')}</td>
          <td><span class="badge badge-${b.status || 'pending'}">${b.status || 'pending'}</span></td>
          <td>${actionBtns}</td>
        </tr>`;
      }).join('');
    };

    window.openDetails = function (b) {
      const catLabels = { drink: 'Welcome Drink', drinks: 'Welcome Drink', starters: 'Starters', vegetables: 'Vegetables', dal: 'Dal', rice: 'Rice', bread: 'Bread', breads: 'Bread', sweets: 'Sweets', sweet: 'Sweets', dessert: 'Dessert', desserts: 'Dessert', extras: 'Extras' };
      const addr = b.address ? [b.address.street, b.address.city, b.address.state, b.address.pincode].filter(Boolean).join(', ') : '—';
      const menu = b.selectedMenu || {};
      const menuEntries = Object.entries(menu).filter(([, v]) => (Array.isArray(v) ? v.length > 0 : v));

      let menuHtml = '';
      if (menuEntries.length > 0) {
        menuHtml = `<div class="bk-section-title">Selected Menu</div>`;
        menuEntries.forEach(([key, val]) => {
          const items = Array.isArray(val) ? val : [val];
          menuHtml += `<div class="bk-detail-row"><span class="lbl">${catLabels[key] || key}</span><span class="val">${items.map(i => `<span class="bk-menu-tag">${i}</span>`).join('')}</span></div>`;
        });
      }

      document.getElementById('bkDetailsBody').innerHTML = `
        <div class="bk-section-title">Customer</div>
        <div class="bk-detail-row"><span class="lbl">Name</span><span class="val">${b.userName || b.name || '—'}</span></div>
        <div class="bk-detail-row"><span class="lbl">Email</span><span class="val">${b.email || '—'}</span></div>
        <div class="bk-detail-row"><span class="lbl">Phone</span><span class="val">${b.phone || '—'}</span></div>

        <div class="bk-section-title">Event</div>
        <div class="bk-detail-row"><span class="lbl">Packages Selected</span><span class="val">${b.packages && b.packages.length > 0 ? b.packages.map(p => p.name).join('<br>') : (b.pkgName || 'Custom Event')}</span></div>
        <div class="bk-detail-row"><span class="lbl">Event Type</span><span class="val">${b.eventType || '—'}</span></div>
        <div class="bk-detail-row"><span class="lbl">Event Date</span><span class="val">${b.eventDate || b.date || '—'}</span></div>
        <div class="bk-detail-row"><span class="lbl">Time</span><span class="val">${b.eventTime || b.time || '—'}</span></div>
        <div class="bk-detail-row"><span class="lbl">Guests</span><span class="val">${b.guestCount || b.guests || '—'}</span></div>
        <div class="bk-detail-row"><span class="lbl">Address</span><span class="val">${addr}</span></div>

        <div class="bk-section-title">Pricing</div>
        <div class="bk-detail-row"><span class="lbl">Subtotal</span><span class="val">${b.subtotal || b.estimatedSubtotal ? '₹' + Number(b.subtotal || b.estimatedSubtotal).toLocaleString('en-IN') : '—'}</span></div>
        <div class="bk-detail-row"><span class="lbl">Grand Total</span><span class="val" style="color:var(--accent); font-size:1.1rem">${b.grandTotal || b.estimatedTotal ? '₹' + Number(b.grandTotal || b.estimatedTotal).toLocaleString('en-IN') : '—'}</span></div>

        ${b.packages && b.packages.length > 0 ? b.packages.map(p => {
        if (p.category !== 'catering') return '';
        const m = p.selectedMenu || {};
        const me = Object.entries(m).filter(([, v]) => (Array.isArray(v) ? v.length > 0 : v));
        if (me.length === 0) return '';
        let h = `<div class="bk-section-title">Menu: ${p.name}</div>`;
        me.forEach(([k, v]) => {
          const items = Array.isArray(v) ? v : [v];
          h += `<div class="bk-detail-row"><span class="lbl">${catLabels[k] || k}</span><span class="val">${items.map(i => `<span class="bk-menu-tag">${i}</span>`).join('')}</span></div>`;
        });
        return h;
      }).join('') : menuHtml}

        ${b.specialReq ? `<div class="bk-section-title">Special Requirements</div><div style="font-size:0.88rem;color:var(--text);line-height:1.5">${b.specialReq}</div>` : ''}
      `;
      document.getElementById('bkDetailsModal').classList.add('open');
    };

    window.doApprove = async function (id) {
      if (!confirm('Approve this booking and calculate the final price?')) return;
      const row = document.querySelector(`[onclick="window.doApprove('${id}')"]`);
      if (row) { row.textContent = 'Approving…'; row.disabled = true; }
      const { success, grandTotal, error } = await approveBooking(id);
      if (success) {
        alert(`Booking approved! Grand Total: ₹${Number(grandTotal).toLocaleString('en-IN')}`);
        await init();
      } else {
        alert('Error: ' + error);
        await init();
      }
    };

    window.doReject = async function (id) {
      if (!confirm('Reject this booking? This action cannot be undone.')) return;
      const { success, error } = await rejectBooking(id);
      if (success) { await init(); }
      else alert('Error: ' + error);
    };

    async function init() {
      await loadPackages();
      const { bookings, error } = await fetchAllBookings();
      if (error) { alert('Error loading bookings: ' + error); return; }
      allBookings = bookings;
      window.renderTable();
    }
    init();
  </script>
  <script src="../js/main.js"></script>
  <script src="../js/admin-sidebar.js"></script>
</body>

</html>
