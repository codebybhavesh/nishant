<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Menu – Nishant Admin</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
        .pkg-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .pkg-row:last-child {
            border-bottom: none;
        }

        .pkg-thumb {
            width: 60px;
            height: 60px;
            border-radius: var(--r-md);
            object-fit: cover;
            flex-shrink: 0;
        }

        .pkg-row-info {
            flex: 1;
        }

        .pkg-row-info h4 {
            font-size: 0.95rem;
        }

        .pkg-row-info p {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 900;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border-radius: var(--r-xl);
            padding: 2rem;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal h3 {
            margin-bottom: 1.5rem;
        }

        .upload-status {
            font-size: 0.8rem;
            margin-top: 0.4rem;
            display: none;
        }

        .upload-status.uploading {
            color: var(--primary);
        }

        .upload-status.success {
            color: #22c55e;
        }

        .upload-status.error {
            color: var(--danger);
        }

        .preview-img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="admin-shell">

        <aside class="sidebar">
            <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close menu">&times;</button>
            <div class="sidebar-logo">
                <img src="../assets/logo.svg" alt="Nishant Logo" style="height:48px; filter:brightness(0) invert(1);">
                <small>Admin Panel</small>
            </div>
            <nav class="sidebar-nav">
                <!-- Dynamically populated by admin-sidebar.js -->
            </nav>
            <div class="sidebar-footer">
                <a href="#" onclick="event.preventDefault(); window.adminLogout();"><svg class="icon" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg> Logout</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <button class="admin-menu-toggle" id="adminMenuToggle" aria-label="Toggle menu">☰</button>
                <h1>Manage Menu Items</h1>
                <button class="btn btn-accent btn-sm" onclick="window.openModal()">+ Add Menu Item</button>
            </div>

            <div class="admin-content">
                <div class="card">
                    <div class="card-header">
                        <h3 id="itemCount">Menu Items</h3>
                    </div>
                    <div id="itemList"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle">Add Menu Item</h3>
            <input type="hidden" id="editId" />
            <div class="form-group"><label>Menu Item Name *</label><input type="text" id="fName" class="form-control"
                    placeholder="Paneer Tikka" /></div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label>Category *</label>
                    <select id="fCategory" class="form-control">
                        <option value="drink">🍹 Welcome Drink</option>
                        <option value="starter">🥟 Starter</option>
                        <option value="veg_dish">🥘 Vegetable Dish</option>
                        <option value="dal">🥣 Dal</option>
                        <option value="rice">🍚 Rice</option>
                        <option value="bread">🫓 Bread</option>
                        <option value="sweet">🍮 Sweet</option>
                        <option value="dessert">🍨 Dessert</option>
                        <option value="extras">🥗 Extras</option>
                    </select>
                </div>
                <div class="form-group"><label>Price (₹) *</label><input type="number" id="fPrice" class="form-control"
                        placeholder="250" /></div>
            </div>
            <div class="form-group">
                <label>Image</label>
                <input type="file" id="fImgFile" class="form-control" accept="image/*" />
                <input type="hidden" id="fImg" />
                <div id="imgUploadStatus" class="upload-status"></div>
                <img id="fImgPreview" class="preview-img" alt="Preview" />
            </div>
            <div class="form-group"><label>Description</label><textarea id="fDesc" class="form-control"
                    rows="3"></textarea>
            </div>
            <div id="modalErr" class="alert alert-danger" style="display:none"></div>
            <div style="display:flex;gap:1rem;margin-top:1rem">
                <button class="btn btn-accent" style="flex:1" onclick="window.saveItem()">Save Item</button>
                <button class="btn btn-outline" onclick="window.closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initAuthListener, logoutUser } from '../js/auth.js';
        import { fetchMenus, addMenu, updateMenu, deleteMenu } from '../js/database.js';
        import { uploadToCloudinary } from '../js/cloudinary.js';

        initAuthListener({ requireAuth: true, requireAdmin: true });
        window.adminLogout = async function () { await logoutUser(); };

        window.render = async function () {
            const { menus, error } = await fetchMenus();
            if (error) return alert("Error fetching menus: " + error);

            document.getElementById('itemCount').textContent = `${menus.length} Item${menus.length !== 1 ? 's' : ''}`;
            const catBadge = { drink: '🍹 Drink', starter: '🥟 Starter', veg_dish: '🥘 Veg Dish', dal: '🥣 Dal', rice: '🍚 Rice', bread: '🫓 Bread', sweet: '🍮 Sweet', dessert: '🍨 Dessert', extras: '🥗 Extras' };

            document.getElementById('itemList').innerHTML = menus.map(m => `
      <div class="pkg-row">
        <img class="pkg-thumb" src="${m.imageURL || 'https://via.placeholder.com/60'}" alt="${m.name}" onerror="this.src='https://placehold.co/60x60?text=Food'" />
        <div class="pkg-row-info">
          <h4>${m.name} <span class="badge" style="font-size:0.7rem;background:var(--primary-light);color:var(--primary)">${catBadge[m.category] || m.category}</span></h4>
          <p>₹${Number(m.price).toLocaleString('en-IN')} · ${m.description || 'No description'}</p>
        </div>
        <div style="display:flex;gap:0.5rem;flex-shrink:0">
          <button class="btn btn-outline btn-sm" onclick='window.editItem(${JSON.stringify(m).replace(/'/g, "&apos;")})'>Edit</button>
          <button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger)" onclick="window.deleteItem('${m.id}')">Delete</button>
        </div>
      </div>`).join('') || `<div class="empty-state"><p>No menu items. Add one above.</p></div>`;
        };

        window.openModal = function (item = null) {
            document.getElementById('modal').classList.add('open');
            document.getElementById('modalErr').style.display = 'none';
            if (!item) {
                document.getElementById('modalTitle').textContent = 'Add Menu Item';
                document.getElementById('editId').value = '';
                ['fName', 'fImg', 'fDesc'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('fPrice').value = '';
                document.getElementById('fImgFile').value = '';
                document.getElementById('fImgPreview').style.display = 'none';
                document.getElementById('imgUploadStatus').style.display = 'none';
            }
        };

        window.editItem = function (m) {
            window.openModal(m);
            document.getElementById('modalTitle').textContent = 'Edit Menu Item';
            document.getElementById('editId').value = m.id;
            document.getElementById('fName').value = m.name;
            document.getElementById('fCategory').value = m.category;
            document.getElementById('fPrice').value = m.price;
            document.getElementById('fImg').value = m.imageURL || '';
            document.getElementById('fDesc').value = m.description || '';
            if (m.imageURL) {
                document.getElementById('fImgPreview').src = m.imageURL;
                document.getElementById('fImgPreview').style.display = 'block';
            } else {
                document.getElementById('fImgPreview').style.display = 'none';
            }
            document.getElementById('imgUploadStatus').style.display = 'none';
        };

        window.closeModal = function () { document.getElementById('modal').classList.remove('open'); };

        // ── Cloudinary upload on file pick ──
        document.getElementById('fImgFile').addEventListener('change', async function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('imgUploadStatus');
            status.className = 'upload-status uploading';
            status.textContent = 'Uploading image… 0%';
            status.style.display = 'block';
            document.getElementById('fImgPreview').style.display = 'none';
            try {
                const url = await uploadToCloudinary(file, (pct) => {
                    status.textContent = `Uploading image… ${pct}%`;
                });
                document.getElementById('fImg').value = url;
                document.getElementById('fImgPreview').src = url;
                document.getElementById('fImgPreview').style.display = 'block';
                status.className = 'upload-status success';
                status.textContent = '✓ Image uploaded successfully';
            } catch (err) {
                status.className = 'upload-status error';
                status.textContent = '✗ Upload failed: ' + err.message;
            }
        });

        window.saveItem = async function () {
            const name = document.getElementById('fName').value.trim();
            const price = parseInt(document.getElementById('fPrice').value);
            if (!name || isNaN(price)) {
                document.getElementById('modalErr').textContent = 'Name and Price are required.';
                document.getElementById('modalErr').style.display = 'block';
                return;
            }

            const editId = document.getElementById('editId').value;
            const item = {
                name,
                price,
                category: document.getElementById('fCategory').value,
                imageURL: document.getElementById('fImg').value.trim(),
                description: document.getElementById('fDesc').value.trim()
            };

            const btnObj = document.querySelector('#modal .btn-accent');
            btnObj.textContent = "Saving...";

            if (editId) {
                await updateMenu(editId, item);
            } else {
                await addMenu(item);
            }

            btnObj.textContent = "Save Item";
            window.closeModal();
            window.render();
        };

        window.deleteItem = async function (id) {
            if (!confirm('Delete this menu item?')) return;
            await deleteMenu(id);
            window.render();
        };

        window.render();
    </script>
    <script src="../js/main.js"></script>
    <script src="../js/admin-sidebar.js"></script>
</body>

</html>
