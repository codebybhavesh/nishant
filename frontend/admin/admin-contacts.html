<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Inquiries – Nishant Admin</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/logo.svg" />
    <link rel="apple-touch-icon" href="../assets/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
        .filter-bar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .filter-bar select {
            padding: 0.5rem 0.9rem;
            border: 1.5px solid var(--border);
            border-radius: var(--r-md);
            font-size: 0.85rem;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
        }

        .filter-bar select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .msg-box {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="admin-shell">

        <aside class="sidebar">
            <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close menu">&times;</button>
            <div class="sidebar-logo">
                <img src="../assets/logo.svg" alt="Nishant Logo" style="height:48px; filter:brightness(0) invert(1);">
                <small>Admin Panel</small>
            </div>
            <nav class="sidebar-nav">
                <!-- Dynamically populated by admin-sidebar.js -->
            </nav>
            <div class="sidebar-footer">
                <a href="#" onclick="event.preventDefault(); window.adminLogout();"><svg class="icon" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg> Logout</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <button class="admin-menu-toggle" id="adminMenuToggle" aria-label="Toggle menu">☰</button>
                <h1>Contact Inquiries</h1>
                <span id="countLabel" style="font-size:0.82rem;color:var(--text-muted)"></span>
            </div>

            <div class="admin-content">

                <!-- Search & Filter bar -->
                <div class="filter-bar">
                    <div class="search-wrap" style="flex:1;max-width:300px">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInp" class="form-control" placeholder="Search by name or email…"
                            oninput="renderTable()" />
                    </div>
                    <select id="statusFilter" onchange="renderTable()">
                        <option value="">All Statuses</option>
                        <option value="unread">Unread</option>
                        <option value="read">Read</option>
                    </select>
                </div>

                <div class="card">
                    <div class="table-wrap" style="border:none;border-radius:0">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Email</th>
                                    <th>Message</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="contactsTbody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script type="module">
        import { initAuthListener, logoutUser } from '../js/auth.js';
        import { apiFetch } from '../js/api.js';

        initAuthListener({ requireAuth: true, requireAdmin: true });
        window.adminLogout = async function () { await logoutUser(); };

        let allContacts = [];

        window.renderTable = function () {
            const q = document.getElementById('searchInp').value.toLowerCase().trim();
            const status = document.getElementById('statusFilter').value;

            let filtered = allContacts;
            if (q) filtered = filtered.filter(c =>
                (c.name || '').toLowerCase().includes(q) ||
                (c.email || '').toLowerCase().includes(q)
            );
            if (status) filtered = filtered.filter(c => c.status === status);

            document.getElementById('countLabel').textContent = `${filtered.length} inquir${filtered.length !== 1 ? 'ies' : 'y'} found`;

            const tbody = document.getElementById('contactsTbody');
            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted)">No inquiries found.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(c => {
                const isUnread = c.status === 'unread';
                const dateStr = c.createdAt ? new Date(c.createdAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
                const id = c.id || c._id;

                let actionBtns = '';
                if (isUnread) {
                    actionBtns += `<button class="btn btn-sm" style="background:var(--success-bg);color:var(--success);margin-right:0.4rem" onclick="window.markRead('${id}')">✓ Mark Read</button>`;
                }
                actionBtns += `<button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger);" onclick="window.deleteInquiry('${id}')">🗑️</button>`;

                return `<tr>
          <td style="white-space:nowrap">${dateStr}</td>
          <td style="font-weight:600">${c.name || '—'}</td>
          <td style="white-space:nowrap">${c.phone || '—'}</td>
          <td>${c.email || '—'}</td>
          <td title="${c.message}"><div class="msg-box">${c.message || '—'}</div></td>
          <td><span class="badge badge-${isUnread ? 'pending' : 'approved'}">${isUnread ? 'Unread' : 'Read'}</span></td>
          <td style="white-space:nowrap">${actionBtns}</td>
        </tr>`;
            }).join('');
        };

        window.markRead = async function (id) {
            if (!confirm('Mark this inquiry as read?')) return;
            try {
                await apiFetch(`/contacts/${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ status: 'read' })
                });
                await fetchContacts();
            } catch (e) {
                alert('Error updating status: ' + e.message);
            }
        };

        window.deleteInquiry = async function (id) {
            if (!confirm('Are you sure you want to delete this inquiry forever?')) return;
            try {
                await apiFetch(`/contacts/${id}`, { method: 'DELETE' });
                await fetchContacts();
            } catch (e) {
                alert('Error deleting inquiry: ' + e.message);
            }
        };

        async function fetchContacts() {
            try {
                const data = await apiFetch('/contacts');
                allContacts = (data.contacts || []).map(d => ({ id: d._id || d.id, ...d }));
                window.renderTable();
            } catch (e) {
                console.error("Error fetching contacts:", e);
            }
        }

        fetchContacts();
    </script>
    <script src="../js/main.js"></script>
    <script src="../js/admin-sidebar.js"></script>
</body>

</html>
