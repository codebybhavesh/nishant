<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Menu Requests – Nishant Admin</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/logo.svg" />
    <link rel="apple-touch-icon" href="../assets/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
        .filter-bar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .filter-bar select {
            padding: 0.5rem 0.9rem;
            border: 1.5px solid var(--border);
            border-radius: var(--r-md);
            font-size: 0.85rem;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
        }

        .filter-bar select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .menu-item-tag {
            display: inline-block;
            background: var(--light-gray);
            padding: 0.2rem 0.6rem;
            border-radius: var(--r-sm);
            font-size: 0.75rem;
            margin: 0.1rem;
            white-space: nowrap;
        }

        /* ---- Details Modal ---- */
        .bk-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .bk-modal-overlay.open {
            display: flex;
        }

        .bk-modal {
            background: var(--surface);
            border-radius: var(--r-xl);
            width: 100%;
            max-width: 560px;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        .bk-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.75rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 1;
        }

        .bk-modal-header h3 {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .bk-modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            line-height: 1;
            padding: 0 0.2rem;
        }

        .bk-modal-body {
            padding: 1.5rem 1.75rem;
        }

        .bk-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--accent);
            margin: 1.2rem 0 0.6rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }

        .bk-section-title:first-child {
            margin-top: 0;
        }

        .bk-detail-row {
            display: flex;
            gap: 0.5rem;
            font-size: 0.88rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .bk-detail-row .lbl {
            min-width: 120px;
            color: var(--text-muted);
            font-weight: 500;
            flex-shrink: 0;
        }

        .bk-detail-row .val {
            color: var(--text);
            font-weight: 600;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="admin-shell">

        <aside class="sidebar">
            <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close menu">&times;</button>
            <div class="sidebar-logo">
                <img src="../assets/logo.svg" alt="Nishant Logo" style="height:48px; filter:brightness(0) invert(1);">
                <small>Admin Panel</small>
            </div>
            <nav class="sidebar-nav">
                <!-- Dynamically populated by admin-sidebar.js -->
            </nav>
            <div class="sidebar-footer">
                <a href="#" onclick="event.preventDefault(); window.adminLogout();"><svg class="icon" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg> Logout</a>
            </div>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <button class="admin-menu-toggle" id="adminMenuToggle" aria-label="Toggle menu">☰</button>
                <h1>Custom Menu Requests</h1>
                <span id="countLabel" style="font-size:0.82rem;color:var(--text-muted)"></span>
            </div>

            <div class="admin-content">

                <!-- Search & Filter bar -->
                <div class="filter-bar">
                    <div class="search-wrap" style="flex:1;max-width:300px">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInp" class="form-control"
                            placeholder="Search client name or phone…" oninput="window.renderRequests()" />
                    </div>
                    <select id="statusFilter" onchange="window.renderRequests()">
                        <option value="">All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="contacted">Contacted</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>

                <div class="card">
                    <div class="table-wrap" style="border:none;border-radius:0">
                        <table>
                            <thead>
                                <tr>
                                    <th>Req ID</th>
                                    <th>Client</th>
                                    <th>Event Date</th>
                                    <th>Guests</th>
                                    <th style="width: 30%;">Selected Items</th>
                                    <th>Notes</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="requestsTbody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- REQUEST DETAILS MODAL -->
    <div class="bk-modal-overlay" id="reqDetailsModal">
        <div class="bk-modal">
            <div class="bk-modal-header">
                <h3>Custom Request Details</h3>
                <button class="bk-modal-close"
                    onclick="document.getElementById('reqDetailsModal').classList.remove('open')">&times;</button>
            </div>
            <div class="bk-modal-body" id="reqDetailsBody"></div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script type="module" src="../js/admin-custom-requests.js"></script>
    <script type="module">
        import { initAuthListener, logoutUser } from '../js/auth.js';
        initAuthListener({ requireAuth: true, requireAdmin: true });
        window.adminLogout = async function () { await logoutUser(); };

        window.openReqDetails = function (r) {
            const addr = r.address
                ? [r.address.street, r.address.city, r.address.state, r.address.pincode].filter(Boolean).join(', ')
                : '—';
            const itemsHtml = r.selectedMenuItems && r.selectedMenuItems.length
                ? r.selectedMenuItems.map(i => `<span class="menu-item-tag">${i.name} <small style="opacity:0.6">(${i.category})</small></span>`).join('')
                : '—';

            document.getElementById('reqDetailsBody').innerHTML = `
                <div class="bk-section-title">Customer</div>
                <div class="bk-detail-row"><span class="lbl">Name</span><span class="val">${r.userName || '—'}</span></div>
                <div class="bk-detail-row"><span class="lbl">Email</span><span class="val">${r.email || '—'}</span></div>
                <div class="bk-detail-row"><span class="lbl">Phone</span><span class="val">${r.phone || '—'}</span></div>

                <div class="bk-section-title">Event</div>
                <div class="bk-detail-row"><span class="lbl">Event Date</span><span class="val">${r.eventDate || '—'}</span></div>
                <div class="bk-detail-row"><span class="lbl">Guests</span><span class="val">${r.guestCount || '—'}</span></div>
                <div class="bk-detail-row"><span class="lbl">Address</span><span class="val">${addr}</span></div>

                <div class="bk-section-title">Selected Menu Items</div>
                <div style="line-height:2">${itemsHtml}</div>

                ${r.notes ? `<div class="bk-section-title">Notes</div><div style="font-size:0.88rem;color:var(--text);line-height:1.5">${r.notes}</div>` : ''}

                <div class="bk-section-title">Status</div>
                <div class="bk-detail-row"><span class="lbl">Current Status</span><span class="val">${r.status || 'pending'}</span></div>
                <div class="bk-detail-row"><span class="lbl">Submitted On</span><span class="val">${r.createdAt ? new Date(r.createdAt).toLocaleString('en-IN') : '—'}</span></div>
            `;
            document.getElementById('reqDetailsModal').classList.add('open');
        };
    </script>
</body>

</html>
