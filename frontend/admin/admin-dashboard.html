<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Nishant Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .recent-table td:first-child {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .chart-bar-wrap {
      margin-top: 1rem;
    }

    .chart-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.85rem;
      font-size: 0.85rem;
    }

    .chart-bar .bar-label {
      width: 100px;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .bar-track {
      flex: 1;
      background: var(--bg-section);
      border-radius: var(--r-full);
      height: 10px;
    }

    .bar-fill {
      height: 100%;
      border-radius: var(--r-full);
      background: linear-gradient(to right, var(--primary), var(--accent));
    }

    .bar-val {
      width: 50px;
      text-align: right;
      font-weight: 600;
      color: var(--text);
    }
  </style>
</head>

<body>
  <div class="admin-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close menu">&times;</button>
      <div class="sidebar-logo">
        <img src="../assets/logo.svg" alt="Nishant Logo" style="height:48px; filter:brightness(0) invert(1);">
        <small>Admin Panel</small>
      </div>
      <nav class="sidebar-nav">
        <!-- Dynamically populated by admin-sidebar.js -->
      </nav>
      <div class="sidebar-footer">
        <a href="#" onclick="event.preventDefault(); window.adminLogout();"><svg class="icon" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg> Logout</a>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="admin-main">
      <div class="admin-topbar">
        <button class="admin-menu-toggle" id="adminMenuToggle" aria-label="Toggle menu">☰</button>
        <h1>Dashboard</h1>
        <div style="display:flex;align-items:center;gap:1rem">
          <span style="font-size:0.82rem;color:var(--text-muted)">👤 Admin</span>
          <a href="../booking.html" class="btn btn-accent btn-sm" target="_blank">+ New Booking</a>
        </div>
      </div>

      <div class="admin-content">

        <!-- KPI CARDS -->
        <div class="kpi-grid" id="kpiGrid">
          <div class="kpi-card">
            <div class="kpi-icon" style="background:var(--primary-light)">📋</div>
            <span class="kpi-num" id="kpiTotal">0</span>
            <span class="kpi-label">Total Bookings</span>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon" style="background:var(--warning-bg)">⏳</div>
            <span class="kpi-num" id="kpiPending">0</span>
            <span class="kpi-label">Pending Review</span>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon" style="background:var(--success-bg)">✅</div>
            <span class="kpi-num" id="kpiApproved">0</span>
            <span class="kpi-label">Approved</span>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon" style="background:var(--primary-light)">💰</div>
            <span class="kpi-num" id="kpiRevenue">₹0</span>
            <span class="kpi-label">Est. Revenue</span>
          </div>
        </div>

        <!-- RECENT + BREAKDOWN -->
        <div class="admin-two-col">

          <!-- Recent Bookings -->
          <div class="card">
            <div class="card-header">
              <h3>Recent Bookings</h3>
              <a href="admin-bookings.html" class="btn btn-ghost btn-sm">View All →</a>
            </div>
            <div class="table-wrap" style="border:none;border-radius:0">
              <table id="recentTable">
                <thead>
                  <tr>
                    <th>Booking ID</th>
                    <th>Client</th>
                    <th>Date</th>
                    <th>Package</th>
                    <th>Total</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="recentBody"></tbody>
              </table>
            </div>
          </div>

          <!-- Package Breakdown -->
          <div class="card card-pad">
            <h3 style="font-size:1rem;margin-bottom:1.5rem">Package Breakdown</h3>
            <div class="chart-bar-wrap" id="pkgChart"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script type="module">
    import { initAuthListener, logoutUser } from '../js/auth.js';
    import { fetchBookings } from '../js/database.js';

    initAuthListener({ requireAuth: true, requireAdmin: true });
    window.adminLogout = async function () { await logoutUser(); };

    document.addEventListener("DOMContentLoaded", async () => {
      const { bookings, error } = await fetchBookings();
      if (error) return console.error(error);

      const pending = bookings.filter(b => b.status === 'pending').length;
      const approved = bookings.filter(b => b.status === 'approved').length;
      const revenue = bookings.filter(b => b.status === 'approved').reduce((s, b) => s + (Number(b.grandTotal) || 0), 0);

      document.getElementById('kpiTotal').textContent = bookings.length;
      document.getElementById('kpiPending').textContent = pending;
      document.getElementById('kpiApproved').textContent = approved;
      document.getElementById('kpiRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');

      const recent = bookings.slice(0, 8);
      const statusBadge = s => `<span class="badge badge-${s}">${s}</span>`;
      document.getElementById('recentBody').innerHTML = recent.map(b => `
        <tr>
          <td><a href="booking-details.html?id=${b.id}" style="color:var(--accent);font-weight:600">${b.id.substring(0, 8)}</a></td>
          <td>${b.name || '—'}</td>
          <td>${b.date || '—'}</td>
          <td>${b.pkgName || b.pkg || '—'}</td>
          <td>${b.grandTotal ? '₹' + Number(b.grandTotal).toLocaleString('en-IN') : '—'}</td>
          <td>${statusBadge(b.status || 'pending')}</td>
        </tr>`).join('') || `<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem">No bookings yet.</td></tr>`;

      const pkgCounts = { veg: 0, nonveg: 0, premium: 0 };
      bookings.forEach(b => { if (pkgCounts[b.pkg] !== undefined) pkgCounts[b.pkg]++; });
      const total = bookings.length || 1;
      const pkgLabelsMap = { veg: '🌿 Veg', nonveg: '🍗 Non-Veg', premium: '👑 Premium' };
      document.getElementById('pkgChart').innerHTML = Object.entries(pkgCounts).map(([k, v]) => `
        <div class="chart-bar">
          <span class="bar-label">${pkgLabelsMap[k]}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v / total * 100)}%"></div></div>
          <span class="bar-val">${v}</span>
        </div>`).join('');
    });
  </script>
  <script src="../js/main.js"></script>
  <script src="../js/admin-sidebar.js"></script>
</body>

</html>
